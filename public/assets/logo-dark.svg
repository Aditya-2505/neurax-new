<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural Network Brain SVG -->
  <g>
    <!-- Left brain hemisphere nodes -->
    <circle cx="80" cy="40" r="3.5" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="60" cy="60" r="3" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="50" cy="85" r="3.5" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="75" cy="95" r="3" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="95" cy="75" r="3.5" fill="#2563eb" filter="url(#brainGlowDark)" />

    <!-- Right brain hemisphere nodes -->
    <circle cx="120" cy="45" r="3" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="140" cy="65" r="3.5" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="150" cy="90" r="3" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="125" cy="100" r="3.5" fill="#2563eb" filter="url(#brainGlowDark)" />
    <circle cx="105" cy="85" r="3" fill="#2563eb" filter="url(#brainGlowDark)" />

    <!-- Connecting lines - left side -->
    <line x1="80" y1="40" x2="60" y2="60" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="60" y1="60" x2="50" y2="85" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="50" y1="85" x2="75" y2="95" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="80" y1="40" x2="95" y2="75" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="95" y1="75" x2="75" y2="95" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />

    <!-- Connecting lines - right side -->
    <line x1="120" y1="45" x2="140" y2="65" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="140" y1="65" x2="150" y2="90" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="150" y1="90" x2="125" y2="100" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="120" y1="45" x2="105" y2="85" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />
    <line x1="105" y1="85" x2="125" y2="100" stroke="#3b82f6" stroke-width="1.2" opacity="0.6" />

    <!-- Cross-hemisphere connections -->
    <line x1="95" y1="75" x2="105" y2="85" stroke="#2563eb" stroke-width="1.8" opacity="0.7" />
    <line x1="80" y1="40" x2="120" y2="45" stroke="#3b82f6" stroke-width="1.2" opacity="0.5" />
  </g>

  <!-- NeuraX Text -->
  <text x="220" y="75" font-family="'Montserrat', 'Arial', sans-serif" font-size="64" font-weight="800" fill="#0f172a">
    Neura
  </text>
  <text x="455" y="75" font-family="'Montserrat', 'Arial', sans-serif" font-size="64" font-weight="800" fill="#2563eb">
    X
  </text>

  <!-- Cognitive Solutions Subtext -->
  <text x="220" y="110" font-family="'Montserrat', 'Arial', sans-serif" font-size="24" font-weight="500" fill="#475569" letter-spacing="3.5">
    COGNITIVE SOLUTIONS
  </text>

  <!-- Glow filter -->
  <defs>
    <filter id="brainGlowDark">
      <feGaussianBlur stdDeviation="1" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
